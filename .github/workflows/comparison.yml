name: comparison-harness
on:
  pull_request:
    paths: ["comparison/**", "pyproject.toml"]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[comparison]"
      - run: pip install ruff
      - run: ruff check comparison/
      - run: ruff format --check comparison/
      - run: python -m pytest comparison/tests -v
