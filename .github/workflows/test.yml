name: Tests & Quality

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      env:
        # Only use DEBUG logging for the specific run that uploads coverage
        COVERAGE_RUN: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && 'true' || 'false' }}
      run: |
        pytest -m "not slow and not regression and not validation"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        files: ./.coverage_cache/coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-fallback:
    # Default-user path: latest numpy (>=2.5) with NO numba, so the goods market
    # uses the pure-Python fallback loop. The main `test` matrix installs `.[dev]`
    # (numba + numpy<2.5) and exercises the JIT kernel; this lane covers the
    # other side: latest numpy + Python fallback. The kernel bit-identity tests
    # skip here (no numba).
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install (numba-free; numpy resolves to latest)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Confirm fallback environment (no numba)
      run: |
        python -c "import numpy; print('numpy', numpy.__version__)"
        python -c "import importlib.util, sys; sys.exit(1 if importlib.util.find_spec('numba') else 0)"
        echo "numba absent: goods market uses the pure-Python fallback"

    - name: Run tests (Python goods-kernel fallback)
      # --no-cov: with numba absent the JIT kernel code is intentionally
      # unexecuted, which would drop coverage below the 99% gate. Coverage is
      # enforced by the main `test` matrix (numba present, kernel covered);
      # this lane only verifies the numpy-2.5 + Python-fallback path works.
      run: |
        pytest -m "not slow and not regression and not validation" --no-cov

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check formatting with ruff
      run: ruff format --check .

    - name: Lint with ruff
      run: ruff check .

    - name: Type check with mypy
      run: mypy
