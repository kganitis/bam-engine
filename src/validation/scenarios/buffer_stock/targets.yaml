# ==============================================================================
# BAM Buffer-Stock Scenario Validation Targets
# ==============================================================================
#
# Target metrics derived from Delli Gatti et al. (2011), Section 3.9.4
# "Macroeconomics from the Bottom-up" Buffer-stock consumption extension.
#
# The buffer-stock extension replaces the baseline mean-field MPC with an
# individual adaptive rule. Validation focuses on reproducing Figure 3.8:
# a complementary CDF of household wealth fitted with Singh-Maddala, Dagum,
# and GB2 distributions.
#
# Structure:
#   metadata: Scenario configuration and buffer-stock parameters
#   metrics: Validation targets with standardized keys
#     - MEAN_TOLERANCE checks: 'target', 'tolerance'
#     - RANGE checks: 'min', 'max'
#     - PCT_WITHIN checks: 'target', 'min'
#     - BOOLEAN checks: 'threshold'
#
# ==============================================================================

metadata:
  source: "Delli Gatti et al. (2011), Section 3.9.4"
  description: "Buffer-stock consumption scenario - Individual Adaptive MPC"

  validation:
    burn_in_periods: 500

  # Buffer-stock extension parameters
  extension_params:
    buffer_stock_h: 2.0

  # Visualization-specific target structure
  visualization:
    time_series:
      unemployment_rate:
        targets:
          normal_min: 0.02         # Book P5 = 0.020
          normal_max: 0.11         # Book P95 = 0.114
          extreme_min: 0.00        # Book min = 0.004; near-zero unemployment occurs
          extreme_max: 0.14        # Book max = 0.139
          mean_target: 0.065       # Book mean = 0.0645
          std_min: 0.02
          std_max: 0.04            # Book std = 0.031

      inflation_rate:
        targets:
          normal_min: -0.01         # Book P5 = -0.009
          normal_max: 0.10          # Book P95 = 0.095
          extreme_min: -0.06        # Book min = -0.058
          extreme_max: 0.15         # Book max = 0.138
          mean_target: 0.038        # Book mean = 0.038

      log_gdp:
        targets:
          normal_min: 8.45       # Book P5 = 8.43
          normal_max: 9.20       # Book P95 = 9.22
          extreme_min: 8.35      # Book min = 8.39
          extreme_max: 9.30      # Book max = 9.25
          mean_target: 8.91      # Book mean = 8.913

      real_wage:
        targets:
          normal_min: 4
          normal_max: 8
          extreme_min: 3
          extreme_max: 10

    curves:
      phillips:
        targets:
          correlation_target: -0.19   # Book text (Section 3.9.2) states r = -0.19
          correlation_min: -0.40      # Model mean=-0.31, std=0.03; 2σ headroom
          correlation_max: -0.05

      okun:
        targets:
          correlation_target: -0.85
          correlation_min: -0.98
          correlation_max: -0.70

      beveridge:
        targets:
          correlation_target: -0.53   # Book Figure 3.5c extracted r = -0.5282 (Growth+, not baseline -0.27)
          correlation_min: -0.65      # Book -0.53 + margin; theory extends to -0.8
          correlation_max: -0.10

    distributions:
      firm_size:
        targets:
          threshold_small: 150.0
          threshold_medium: 100.0
          pct_below_small_target: 0.90
          pct_below_small_min: 0.80
          pct_below_small_max: 0.95
          skewness_target: 3.0
          skewness_tolerance: 2.5
          tail_ratio_min: 2.0
          tail_ratio_max: 10.0

      wealth:
        targets:
          gini_min: 0.2
          gini_max: 0.8
          skewness_min: 0.5
          skewness_max: 10.0


# ==============================================================================
# Metric Targets (standardized keys)
# ==============================================================================

metrics:

  # --------------------------------------------------------------------------
  # Time Series Metrics
  # --------------------------------------------------------------------------

  unemployment_rate_mean:
    target: 0.065      # Book Figure 3.4b mean = 0.0645
    tolerance: 0.02

  unemployment_absolute_ceiling:
    threshold: 0.20

  unemployment_std:
    min: 0.02
    max: 0.04            # Book std = 0.031

  unemployment_pct_above_floor:
    target: 0.90
    min: 0.80
    floor: 0.02

  unemployment_pct_below_ceiling:
    target: 0.90
    min: 0.80
    ceiling: 0.15

  inflation_rate_mean:
    target: 0.038            # Book Figure 3.4c mean = 0.038
    tolerance: 0.025

  inflation_hard_ceiling_upper:
    threshold: 0.25

  inflation_hard_floor:
    threshold: -0.15

  inflation_non_degenerate:
    min: 0.0
    max: 0.10

  inflation_pct_in_bounds:
    target: 0.90
    min: 0.80
    bounds_min: -0.02
    bounds_max: 0.10

  log_gdp_mean:
    target: 8.91       # Book Figure 3.4a mean = 8.913
    tolerance: 0.15

  vacancy_rate_mean:
    target: 0.13      # Book Figure 3.5c mean = 0.129
    tolerance: 0.03

  vacancy_rate_pct_in_bounds:
    target: 0.90
    min: 0.80
    bounds_min: 0.08
    bounds_max: 0.20

  # --------------------------------------------------------------------------
  # Curve Correlations
  # --------------------------------------------------------------------------

  phillips_correlation:
    min: -0.50
    max: -0.05

  phillips_negative_sign:
    min: -1.0
    max: 0.0

  okun_correlation:
    min: -0.98
    max: -0.70

  beveridge_correlation:
    min: -0.65  # Book Figure 3.5c extracted r = -0.53; theory range extends to -0.8
    max: -0.10

  beveridge_negative_sign:
    min: -1.0
    max: 0.0

  # --------------------------------------------------------------------------
  # Distribution Metrics (firm size)
  # --------------------------------------------------------------------------

  firm_size_skewness:
    target: 3.0       # Moderate right-skewness
    tolerance: 2.0    # PASS: [1.0, 5.0] with gradual score decay
    min: 1.0          # FAIL below this
    max: 10.0         # FAIL above this

  firm_size_pct_below:
    min: 0.85
    max: 0.95
    threshold: 150.0

  firm_size_tail_ratio:
    min: 2.0
    max: 10.0

  # --------------------------------------------------------------------------
  # Wealth Distribution Fitting (Figure 3.8)
  # --------------------------------------------------------------------------

  sm_ccdf_r2:
    min: 0.80
    max: 1.0

  dagum_ccdf_r2:
    min: 0.80
    max: 1.0

  gb2_ccdf_r2:
    min: 0.80
    max: 1.0

  best_r2:
    min: 0.85
    max: 1.0

  wealth_gini:
    min: 0.2
    max: 0.8

  wealth_skewness:
    min: 0.5
    max: 10.0

  # --------------------------------------------------------------------------
  # Buffer-Stock Specific Metrics
  # --------------------------------------------------------------------------

  mean_mpc:
    min: 0.8
    max: 1.1

  pct_dissaving:
    min: 0.05
    max: 0.55

  # --------------------------------------------------------------------------
  # Financial Dynamics
  # --------------------------------------------------------------------------

  bankruptcies_mean:
    target: 2.0       # Book Figure 3.6d: mean = 1.96
    tolerance: 1.5

  real_interest_rate_mean:
    target: 0.05
    tolerance: 0.02
