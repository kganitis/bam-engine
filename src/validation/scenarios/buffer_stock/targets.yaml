# ==============================================================================
# BAM Buffer-Stock Scenario Validation Targets
# ==============================================================================
#
# Target metrics derived from Delli Gatti et al. (2011), Section 3.9.4
# "Macroeconomics from the Bottom-up" Buffer-stock consumption extension.
#
# The buffer-stock extension replaces the baseline mean-field MPC with an
# individual adaptive rule. Validation focuses on:
#
#   1. Unique metrics (per-seed): Reproducing Figure 3.8 (wealth CCDF
#      fitted with Singh-Maddala, Dagum, and GB2 distributions) and
#      behavioral metrics (MPC, dissaving). These determine per-seed PASS/FAIL.
#
#   2. Improvement over Growth+ (aggregate): Mean score deltas across all
#      seeds compared against the Growth+ baseline. Checked once after
#      stability testing completes, not per seed (per-seed variance is too
#      high for reliable comparison). Growth+ targets are read from
#      growth_plus/targets.yaml at runtime (single source of truth).
#
# ==============================================================================

metadata:
  source: "Delli Gatti et al. (2011), Section 3.9.4"
  description: "Buffer-stock consumption scenario - improvement over Growth+"

  validation:
    burn_in_periods: 500

  # Buffer-stock extension parameters
  extension_params:
    buffer_stock_h: 2.0

  # Visualization-specific target structure
  visualization:
    distributions:
      wealth:
        targets:
          gini_min: 0.2
          gini_max: 0.8
          skewness_min: 0.5
          skewness_max: 10.0

# ==============================================================================
# Improvement Comparison Configuration
# ==============================================================================
#
# Controls how aggregate improvement is assessed after stability testing.
#
# blend_alpha: (informational) Weight balance between unique and improvement
#   concerns. Used in reporting, not in per-seed PASS/FAIL.
#
# max_degradation_base: Base threshold for aggregate degradation check.
#   Actual threshold = base / weight. Aggregate means are very stable
#   (std_of_mean = per_seed_std / sqrt(n_seeds)), so a strict base works.
#
#   With 100 seeds, even firm_size_skewness (per-seed std=0.46) has
#   std_of_mean=0.046, well within the threshold for weight=1.5 (0.167).

improvement:
  blend_alpha: 0.6
  max_degradation_base: 0.25

# ==============================================================================
# Unique Metric Targets (8 metrics)
# ==============================================================================
#
# Only buffer-stock-specific metrics are defined here.
# These determine per-seed PASS/FAIL in validation and stability testing.
# Growth+ metrics are assessed at the aggregate level only.

metrics:

  # --------------------------------------------------------------------------
  # Wealth Distribution Fitting (Figure 3.8)
  # --------------------------------------------------------------------------

  sm_ccdf_r2:          # Singh-Maddala CCDF R²
    min: 0.80
    max: 1.0

  dagum_ccdf_r2:       # Dagum CCDF R²
    min: 0.80
    max: 1.0

  gb2_ccdf_r2:         # GB2 CCDF R²
    min: 0.80
    max: 1.0

  best_r2:             # Best-fitting distribution R²
    min: 0.85
    max: 1.0

  wealth_gini:         # Gini coefficient of wealth
    min: 0.2
    max: 0.8

  wealth_skewness:     # Skewness of wealth distribution
    min: 0.5
    max: 10.0

  # --------------------------------------------------------------------------
  # Buffer-Stock Behavioral Metrics
  # --------------------------------------------------------------------------

  mean_mpc:            # Mean adjusted MPC (employed households)
    min: 0.8
    max: 1.1

  pct_dissaving:       # Fraction with adjusted c > 1.0
    min: 0.05
    max: 0.55
