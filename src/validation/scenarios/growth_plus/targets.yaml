# ==============================================================================
# BAM Growth+ Scenario Validation Targets
# ==============================================================================
#
# Target metrics derived from Delli Gatti et al. (2011), Section 3.9.2
# "Macroeconomics from the Bottom-up" Growth+ extension scenario results.
#
# Structure:
#   metadata: Scenario configuration and R&D parameters
#   metrics: Validation targets with standardized keys
#     - MEAN_TOLERANCE checks: 'target', 'tolerance'
#     - RANGE checks: 'min', 'max'
#     - PCT_WITHIN checks: 'target', 'min'
#     - BOOLEAN checks: 'threshold'
#     - OUTLIER checks: 'max_outlier', 'penalty_weight'
#
# ==============================================================================

metadata:
  source: "Delli Gatti et al. (2011), Section 3.9.2"
  description: "Growth+ scenario - Endogenous Productivity Growth via R&D"

  validation:
    burn_in_periods: 500

  # R&D extension parameters
  extension_params:
    sigma_min: 0.0
    sigma_max: 0.1
    sigma_decay: -1.0

  # Visualization-specific target structure (used by growth_plus_viz.py)
  visualization:
    time_series:
      unemployment_rate:
        targets:
          normal_min: 0.02         # Book P5 = 0.020
          normal_max: 0.11         # Book P95 = 0.114
          extreme_min: 0.00        # Book min = 0.004; near-zero unemployment occurs
          extreme_max: 0.14        # Book max = 0.139
          mean_target: 0.065       # Book mean = 0.0645
          std_min: 0.02
          std_max: 0.04            # Book std = 0.031

      inflation_rate:
        targets:
          normal_min: -0.01         # Book P5 = -0.009
          normal_max: 0.10          # Book P95 = 0.095
          extreme_min: -0.06        # Book min = -0.058
          extreme_max: 0.15         # Book max = 0.138
          mean_target: 0.038        # Book mean = 0.038

      log_gdp:
        targets:
          normal_min: 8.45       # Book P5 = 8.43
          normal_max: 9.20       # Book P95 = 9.22
          extreme_min: 8.35      # Book min = 8.39
          extreme_max: 9.30      # Book max = 9.25
          mean_target: 8.91      # Book mean = 8.913

      productivity:
        targets:
          initial_min: 9            # Book = 10.5; theory: depends on initial conditions
          initial_max: 12
          final_min: 20             # Book = 22.4; with 80%+ growth from ~10
          final_max: 25
          total_growth_min: 0.8
          total_growth_max: 1.5     # Book = 1.14
          trend_coefficient_min: 0.001
          trend_coefficient_max: 0.002  # Book = 0.0015; >0.002 implies unrealistic acceleration

      real_wage:
        targets:
          initial_min: 6            # Book = 7.3; with ratio ~0.65 and prod ~10
          initial_max: 8
          final_min: 14             # Book = 15.6; with ratio ~0.65 and prod ~22
          final_max: 18
          total_growth_min: 0.8
          total_growth_max: 1.5     # Book = 1.12; symmetric with productivity (Kaldor)

    curves:
      phillips:
        targets:
          correlation_target: -0.19   # Book text (Section 3.9.2) states r = -0.19
          correlation_min: -0.40      # Model mean=-0.31, std=0.03; 2σ headroom
          correlation_max: -0.05

      okun:
        targets:
          correlation_target: -0.85
          correlation_min: -0.98
          correlation_max: -0.70

      beveridge:
        targets:
          correlation_target: -0.27   # Book Figure 3.5c
          correlation_min: -0.65      # Theoretical min
          correlation_max: -0.10

    distributions:
      firm_size:
        targets:
          threshold_small: 150.0
          threshold_medium: 100.0
          pct_below_small_target: 0.90
          pct_below_small_min: 0.80
          pct_below_small_max: 0.95
          pct_below_medium_target: 0.37    # Book Figure 3.5d extracted
          pct_below_medium_min: 0.30
          skewness_target: 3.0
          skewness_tolerance: 2.5
          skewness_hard_min: 0.50
          skewness_hard_max: 10.0
          tail_ratio_min: 2.0
          tail_ratio_max: 10.0

      vacancy_rate:
        targets:
          normal_min: 0.08
          normal_max: 0.18
          mean_target: 0.13      # Book Figure 3.5c mean = 0.129

    financial_dynamics:
      bankruptcies:
        targets:
          mean_target: 2.0       # Book Figure 3.6d: mean = 1.96
          mean_tolerance: 2.5

      real_interest_rate:
        targets:
          mean_target: 0.05
          mean_tolerance: 0.02
          std_target: 0.025    # Book Figure 3.6c extracted
          std_tolerance: 0.01
          normal_min: -0.02
          normal_max: 0.12
          extreme_min: -0.05
          extreme_max: 0.15

      financial_fragility:
        targets:
          mean_target: 0.075     # Book Figure 3.7a extracted
          mean_tolerance: 0.03
          cv_target: 0.15
          cv_tolerance: 0.08
          normal_min: 0.05
          normal_max: 0.12
          extreme_min: 0.02
          extreme_max: 0.15

      price_ratio:
        targets:
          mean_target: 1.375    # Book Figure 3.7b extracted
          mean_tolerance: 0.15
          cv_target: 0.10       # Book Figure 3.7b: CV = 0.095
          cv_tolerance: 0.08
          normal_min: 1.1
          normal_max: 1.8
          extreme_min: 1.0
          extreme_max: 2.0

      price_dispersion:
        targets:
          mean_target: 0.275    # Book Figure 3.7c extracted
          mean_tolerance: 0.08
          std_target: 0.037     # Book Figure 3.7c: std = 0.037 (uses std not CV)
          std_tolerance: 0.015
          normal_min: 0.20
          normal_max: 0.35
          extreme_min: 0.15
          extreme_max: 0.40

      equity_dispersion:
        targets:
          mean_target: 1.75     # Book Figure 3.7d extracted
          mean_tolerance: 0.5
          cv_target: 0.34       # Book Figure 3.7d: equity CV = 0.339
          cv_tolerance: 0.12
          normal_min: 0.6
          normal_max: 2.5
          extreme_min: 0.3
          extreme_max: 3.0

      sales_dispersion:
        targets:
          mean_target: 1.5
          mean_tolerance: 0.5
          cv_target: 0.50       # Book Figure 3.7d: sales CV = 0.494
          cv_tolerance: 0.15
          normal_min: 0.5
          normal_max: 3.0
          extreme_min: 0.3
          extreme_max: 3.5

      minsky_classification:
        targets:
          hedge_pct_target: 0.67    # Book Section 3.9.2: "approximately two thirds"
          hedge_pct_min: 0.50       # Theory: hedge should be majority
          hedge_pct_max: 0.80       # Book ~2/3; >80% means too few fragile firms
          ponzi_pct_target: 0.08    # Book: "less than one tenth"
          ponzi_pct_min: 0.01       # Must have some Ponzi for Minsky dynamics
          ponzi_pct_max: 0.15       # Book: <10%; tighten from 0.50

      output_growth_distribution:
        targets:
          tight_range_min: -0.05
          tight_range_max: 0.05
          normal_range_min: -0.10
          normal_range_max: 0.10
          extreme_range_min: -0.15
          extreme_range_max: 0.15
          pct_within_tight_target: 0.95
          pct_within_tight_min: 0.90
          pct_within_normal_target: 0.99
          pct_within_normal_min: 0.96
          max_outlier_pct: 0.02
          outlier_penalty_weight: 2.0

      networth_growth_distribution:
        targets:
          tight_range_min: -0.05
          tight_range_max: 0.05
          normal_range_min: -0.10
          normal_range_max: 0.10
          extreme_range_min: -0.50
          extreme_range_max: 0.20
          pct_within_tight_target: 0.75
          pct_within_tight_min: 0.60
          pct_within_normal_target: 0.90
          pct_within_normal_min: 0.80
          max_outlier_pct: 0.05
          outlier_penalty_weight: 2.0
          tent_r2_min: 0.65


# ==============================================================================
# Metric Targets (standardized keys)
# ==============================================================================

metrics:

  # --------------------------------------------------------------------------
  # Time Series Metrics
  # --------------------------------------------------------------------------

  unemployment_rate_mean:
    target: 0.065      # Book Figure 3.4b mean = 0.0645; NAIRU range 4-8%
    tolerance: 0.02

  unemployment_absolute_ceiling:
    threshold: 0.20

  unemployment_std:
    min: 0.02
    max: 0.04            # Book std = 0.031; tighten from 0.045

  unemployment_pct_above_floor:
    target: 0.90
    min: 0.80
    floor: 0.02

  unemployment_pct_below_ceiling:
    target: 0.90
    min: 0.80
    ceiling: 0.15

  inflation_rate_mean:
    target: 0.038            # Book Figure 3.4c mean = 0.038
    tolerance: 0.025

  inflation_hard_ceiling_upper:
    threshold: 0.25

  inflation_hard_floor:
    threshold: -0.15

  inflation_non_degenerate:
    min: 0.0
    max: 0.10

  inflation_pct_in_bounds:
    target: 0.90
    min: 0.80
    bounds_min: -0.02
    bounds_max: 0.10

  log_gdp_mean:
    target: 8.91       # Book Figure 3.4a mean = 8.913
    tolerance: 0.20

  log_gdp_trend:
    min: 0.001
    max: 0.002          # Book = 0.00149; >0.002 implies unrealistic acceleration

  log_gdp_trend_positive:
    # BOOLEAN check - must be > 0
    threshold: 0.0

  log_gdp_total_growth:
    min: 0.45            # Book = 0.734; 0.45 log pts = ~57% GDP increase (minimum meaningful)
    max: 1.0             # 1.0 log pts = ~172% GDP growth (upper plausible bound)

  vacancy_rate_mean:
    target: 0.13      # Book Figure 3.5c mean = 0.129; model mean = 0.128
    tolerance: 0.03

  vacancy_rate_pct_in_bounds:
    target: 0.90
    min: 0.80
    bounds_min: 0.08
    bounds_max: 0.20

  # --------------------------------------------------------------------------
  # Curve Correlations
  # --------------------------------------------------------------------------

  phillips_correlation:
    min: -0.50  # Extended from -0.35 to allow stronger correlations
    max: -0.05

  phillips_negative_sign:
    min: -1.0
    max: 0.0

  okun_correlation:
    min: -0.98
    max: -0.70
    # Tiered thresholds:
    # - PASS: r in [-0.98, -0.70]
    # - WARN: r in [-0.70, -0.56] (symmetric buffer)
    # - FAIL: r > -0.56 (from RANGE) or r >= -0.50 (from okun_weak_fail)

  okun_weak_fail:
    threshold: -0.50  # For reference (BOOLEAN uses MetricSpec threshold)

  beveridge_correlation:
    min: -0.65  # Book Figure 3.5c extracted r = -0.53; theory range extends to -0.8
    max: -0.10

  beveridge_negative_sign:
    min: -1.0
    max: 0.0

  # --------------------------------------------------------------------------
  # Distribution Metrics
  # --------------------------------------------------------------------------

  firm_size_skewness:
    target: 3.0       # Moderate right-skewness
    tolerance: 2.0    # PASS: [1.0, 5.0] with gradual score decay
    min: 1.0          # FAIL below this
    max: 10.0         # FAIL above this; anything in [1.0, 10.0] is at most WARN

  firm_size_pct_below:
    min: 0.85
    max: 0.95
    threshold: 150.0

  firm_size_tail_ratio:
    min: 2.0
    max: 10.0

  firm_size_pct_below_medium:
    target: 0.37      # Book Figure 3.5d: 37 of 100 firms below production 100
    min: 0.30
    threshold: 100.0

  # --------------------------------------------------------------------------
  # Growth Metrics
  # --------------------------------------------------------------------------

  productivity_growth:
    min: 0.8
    max: 1.5             # Book = 1.14; 250% was implausibly high for this model

  real_wage_growth:
    min: 0.8
    max: 1.5             # Book = 1.12; symmetric with productivity (Kaldor)

  # Productivity-Wage Co-movement (Figure 3.4d validation)
  productivity_wage_correlation:
    min: 0.55            # Kaldor's 1st fact: wages track productivity; book = 0.946
    max: 1.0             # Model mean = 0.72 (std 0.10); 0.55+ is moderate positive co-movement

  wage_productivity_ratio_mean:
    min: 0.60         # Labor share: theory expects 0.60-0.70; book = 0.70
    max: 0.70

  wage_productivity_ratio_std:
    min: 0.0
    max: 0.10            # Kaldor: constant labor share; book = 0.055; lower is better

  productivity_trend:
    min: 0.001
    max: 0.002           # Book = 0.00152; >0.002 implies unrealistic acceleration

  n_recessions:
    min: 2
    max: 8

  avg_recession_length:
    min: 20
    max: 100

  # --------------------------------------------------------------------------
  # Financial Dynamics Metrics
  # --------------------------------------------------------------------------

  bankruptcies_mean:
    target: 2.0       # Book Figure 3.6d: mean = 1.96
    tolerance: 1.5

  real_interest_rate_mean:
    target: 0.05
    tolerance: 0.025

  real_interest_rate_std:
    target: 0.025     # Book Figure 3.6c: std = 0.026
    tolerance: 0.01

  real_interest_rate_pct_in_bounds:
    target: 0.80
    min: 0.70
    bounds_min: -0.02
    bounds_max: 0.12

  financial_fragility_mean:
    target: 0.075     # Book Figure 3.7a: mean = 0.075
    tolerance: 0.025

  financial_fragility_cv:
    target: 0.15
    tolerance: 0.08

  fragility_gdp_correlation:
    min: 0.0
    max: 1.0

  price_ratio_mean:
    target: 1.375     # Book Figure 3.7b: mean = 1.376
    tolerance: 0.20

  price_ratio_cv:
    target: 0.10      # Book Figure 3.7b: CV = 0.095
    tolerance: 0.08

  price_ratio_gdp_correlation:
    min: -0.95
    max: -0.40

  price_ratio_floor:
    threshold: 1.0

  price_ratio_low_end:
    min: 1.05
    max: 1.55

  price_dispersion_mean:
    target: 0.275     # Book Figure 3.7c: mean = 0.275
    tolerance: 0.08

  price_dispersion_std:
    target: 0.037     # Book Figure 3.7c: std = 0.037 (uses std not CV — CV inflates when mean is low)
    tolerance: 0.015

  price_dispersion_gdp_correlation:
    min: 0.0
    max: 1.0

  equity_dispersion_mean:
    target: 1.75      # Book Figure 3.7d: equity mean = 1.766
    tolerance: 0.5

  equity_dispersion_cv:
    target: 0.34      # Book Figure 3.7d: equity CV = 0.339
    tolerance: 0.17

  equity_dispersion_gdp_correlation:
    min: 0.0
    max: 1.0

  sales_dispersion_mean:
    target: 1.5
    tolerance: 0.5

  sales_dispersion_cv:
    target: 0.50      # Book Figure 3.7d: sales CV = 0.494
    tolerance: 0.25

  sales_dispersion_gdp_correlation:
    min: 0.0
    max: 1.0

  # --------------------------------------------------------------------------
  # Minsky Classification
  # --------------------------------------------------------------------------

  minsky_hedge_pct:
    min: 0.50         # Theory: hedge must be majority (Minsky 1986)
    max: 0.80         # Book: ~2/3; too high means no financial fragility dynamics

  minsky_ponzi_pct:
    min: 0.04         # Must have some Ponzi for Minsky cycle dynamics
    max: 0.12         # Book Section 3.9.2: "less than one tenth"

  # --------------------------------------------------------------------------
  # Growth Rate Distribution Metrics
  # --------------------------------------------------------------------------

  output_growth_pct_tight:
    target: 0.95
    min: 0.90

  output_growth_pct_normal:
    target: 0.99
    min: 0.96

  output_growth_outliers:
    max_outlier: 0.02
    penalty_weight: 2.0

  output_growth_tent_r2:
    min: 0.85
    max: 1.0

  output_growth_positive_frac:
    min: 0.50
    max: 0.85

  networth_growth_pct_tight:
    target: 0.75
    min: 0.60

  networth_growth_pct_normal:
    target: 0.90
    min: 0.80

  networth_growth_outliers:
    max_outlier: 0.05
    penalty_weight: 2.0

  networth_growth_tent_r2:
    min: 0.65
    max: 1.0
